<!DOCTYPE html>
<html>
<head>
    <title>HDHomeRun Guide</title>
</head>
<body>
    <div id="hdhomerunGuideConfigPage" data-role="page" class="page type-interior pluginConfigurationPage">
        <div data-role="content">
            <div class="content-primary">
                <form id="hdhomerunGuideConfigForm">
                    <div class="sectionTitleContainer flex align-items-center">
                        <h2 class="sectionTitle">HDHomeRun Guide</h2>
                    </div>
                    <div class="fieldDescription">Plugin UI build: 0.3.0.0-xmltv-only</div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="txtTunerAddress">Tuner IP or URL</label>
                        <input is="emby-input" id="txtTunerAddress" name="txtTunerAddress" type="text" placeholder="192.0.2.10" />
                        <div class="fieldDescription">The plugin reads DeviceAuth from this tuner's discover.json on the Jellyfin server.</div>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="txtScanSubnet">Scan subnet</label>
                        <input is="emby-input" id="txtScanSubnet" name="txtScanSubnet" type="text" placeholder="192.168.1.0/24" />
                        <div class="fieldDescription">Optional. Scans are limited to /24 through /30 networks.</div>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="txtRefreshHours">Refresh interval in hours</label>
                        <input is="emby-input" id="txtRefreshHours" name="txtRefreshHours" type="number" min="1" max="168" />
                    </div>

                    <label class="checkboxContainer">
                        <input is="emby-checkbox" id="chkSkipDrm" name="chkSkipDrm" type="checkbox" />
                        <span>Skip DRM channels in generated M3U</span>
                    </label>

                    <label class="checkboxContainer">
                        <input is="emby-checkbox" id="chkAutoConfigureLiveTv" name="chkAutoConfigureLiveTv" type="checkbox" />
                        <span>Update Jellyfin Live TV M3U/XMLTV paths after refresh</span>
                    </label>

                    <div class="button-submit-section">
                        <button is="emby-button" type="button" class="raised button-submit block" id="btnAddMyTuners" onclick="return window.hdhomerunGuideConfig.addMyTuners(this);">
                            <span>Find and Add My Tuners</span>
                        </button>
                        <button is="emby-button" type="button" class="raised button-cancel block" id="btnRefresh" onclick="return window.hdhomerunGuideConfig.refreshNow(this);">
                            <span>Refresh Now</span>
                        </button>
                        <button is="emby-button" type="submit" class="raised button-submit block">
                            <span>Save</span>
                        </button>
                    </div>

                    <div id="hdhomerunGuideStatus" class="fieldDescription" style="margin-top:2em;white-space:pre-wrap;"></div>
                    <div id="hdhomerunGuideResults" style="margin-top:1em;"></div>
                </form>
            </div>
        </div>
        <script type="text/javascript">
            (function () {
                const pluginId = 'dedaf64f-c6d3-4b51-b88e-64873ec088a5';
                const rootId = 'hdhomerunGuideConfigPage';

                function findPage(source) {
                    if (source && source.closest) {
                        const scopedPage = source.closest('#' + rootId);
                        if (scopedPage) {
                            return scopedPage;
                        }
                    }

                    return document.querySelector('#' + rootId);
                }

                function setStatus(configPage, message) {
                    configPage.querySelector('#hdhomerunGuideStatus').textContent = message || '';
                }

                function valueOf(item, lowerName, upperName) {
                    return item[lowerName] === undefined ? item[upperName] : item[lowerName];
                }

                function problemMessage(err, fallback) {
                    if (!err) {
                        return fallback;
                    }

                    return err.message || err.Message || err.detail || err.Detail || err.title || err.Title || fallback;
                }

                function renderTuners(configPage, tuners) {
                    const container = configPage.querySelector('#hdhomerunGuideResults');
                    container.innerHTML = '';
                    if (!tuners || !tuners.length) {
                        container.textContent = 'No HDHomeRun tuners found.';
                        return;
                    }

                    tuners.forEach(function (tuner) {
                        const address = valueOf(tuner, 'address', 'Address');
                        const friendlyName = valueOf(tuner, 'friendlyName', 'FriendlyName');
                        const tunerCount = valueOf(tuner, 'tunerCount', 'TunerCount');
                        const button = document.createElement('button');
                        button.setAttribute('is', 'emby-button');
                        button.type = 'button';
                        button.className = 'raised button-cancel block';
                        button.textContent = friendlyName + ' ' + address + ' (' + tunerCount + ' tuners)';
                        button.addEventListener('click', function () {
                            configPage.querySelector('#txtTunerAddress').value = address;
                            setStatus(configPage, 'Selected ' + address + '. Save to refresh now and enable automatic updates.');
                        });
                        container.appendChild(button);
                    });
                }

                function loadConfig(configPage) {
                    if (!configPage) {
                        return Promise.resolve();
                    }

                    Dashboard.showLoadingMsg();
                    return ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                        configPage.querySelector('#txtTunerAddress').value = config.TunerAddress || '';
                        configPage.querySelector('#txtScanSubnet').value = config.ScanSubnet || '';
                        configPage.querySelector('#txtRefreshHours').value = config.RefreshIntervalHours || 12;
                        configPage.querySelector('#chkSkipDrm').checked = config.SkipDisabledChannels !== false;
                        configPage.querySelector('#chkAutoConfigureLiveTv').checked = config.AutoConfigureLiveTv !== false;

                        const lines = ['Plugin UI build: 0.3.0.0-xmltv-only'];
                        if (config.LastRefreshUtc) {
                            lines.push('Last refresh: ' + config.LastRefreshUtc);
                        }
                        if (config.LastTunerCount) {
                            lines.push('Tuners: ' + config.LastTunerCount);
                        }
                        if (config.LastGuidePath) {
                            lines.push('XMLTV: ' + config.LastGuidePath);
                        }
                        if (config.LastM3uPath) {
                            lines.push('M3U: ' + config.LastM3uPath);
                        }
                        if (config.LastError) {
                            lines.push('Last error: ' + config.LastError);
                        }
                        setStatus(configPage, lines.join('\n'));
                    }).finally(Dashboard.hideLoadingMsg);
                }

                function saveConfig(configPage) {
                    return ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                        config.TunerAddress = configPage.querySelector('#txtTunerAddress').value;
                        config.ScanSubnet = configPage.querySelector('#txtScanSubnet').value;
                        config.RefreshIntervalHours = parseInt(configPage.querySelector('#txtRefreshHours').value || '12', 10);
                        config.SkipDisabledChannels = configPage.querySelector('#chkSkipDrm').checked;
                        config.AutoConfigureLiveTv = configPage.querySelector('#chkAutoConfigureLiveTv').checked;
                        return ApiClient.updatePluginConfiguration(pluginId, config);
                    });
                }

                function submitForm(event) {
                    const form = event.target.closest && event.target.closest('#hdhomerunGuideConfigForm');
                    if (!form) {
                        return;
                    }

                    event.preventDefault();
                    const configPage = findPage(form);
                    Dashboard.showLoadingMsg();
                    saveConfig(configPage).then(function (result) {
                        Dashboard.processPluginConfigurationUpdateResult(result);
                        setStatus(configPage, 'Configuration saved. Refreshing guide data now; future updates will run automatically.');
                        return ApiClient.ajax({
                            type: 'POST',
                            url: ApiClient.getUrl('HDHomeRunGuide/Refresh')
                        });
                    }).then(function (result) {
                        setStatus(configPage, 'Refresh complete.\nSource: ' + valueOf(result, 'guideSource', 'GuideSource') + '\nTuners: ' + valueOf(result, 'tunerCount', 'TunerCount') + '\nXMLTV: ' + valueOf(result, 'guidePath', 'GuidePath') + '\nM3U: ' + valueOf(result, 'm3uPath', 'M3uPath') + '\nChannels: ' + valueOf(result, 'channelCount', 'ChannelCount') + '\nProgrammes: ' + valueOf(result, 'programmeCount', 'ProgrammeCount'));
                        loadConfig(configPage);
                    }).catch(function (err) {
                        setStatus(configPage, problemMessage(err, 'Configuration saved, but the automatic refresh failed.'));
                    }).finally(Dashboard.hideLoadingMsg);
                }

                function clickButton(event) {
                    const button = event.target.closest && event.target.closest('button');
                    if (!button) {
                        return;
                    }

                    const configPage = findPage(button);
                    if (!configPage || configPage.id !== rootId) {
                        return;
                    }

                    if (button.id === 'btnAddMyTuners') {
                        Dashboard.showLoadingMsg();
                        setStatus(configPage, 'Finding HDHomeRun tuners and configuring Live TV...');
                        saveConfig(configPage).then(function () {
                            return ApiClient.ajax({
                                type: 'POST',
                                url: ApiClient.getUrl('HDHomeRunGuide/AddMyTuners')
                            });
                        }).then(function (result) {
                            setStatus(configPage, 'Tuners added and guide refreshed.\nSource: ' + valueOf(result, 'guideSource', 'GuideSource') + '\nTuners: ' + valueOf(result, 'tunerCount', 'TunerCount') + '\nXMLTV: ' + valueOf(result, 'guidePath', 'GuidePath') + '\nM3U: ' + valueOf(result, 'm3uPath', 'M3uPath') + '\nChannels: ' + valueOf(result, 'channelCount', 'ChannelCount') + '\nProgrammes: ' + valueOf(result, 'programmeCount', 'ProgrammeCount'));
                            loadConfig(configPage);
                        }).catch(function (err) {
                            setStatus(configPage, problemMessage(err, 'Could not add HDHomeRun tuners.'));
                        }).finally(Dashboard.hideLoadingMsg);
                    }

                    if (button.id === 'btnRefresh') {
                        Dashboard.showLoadingMsg();
                        saveConfig(configPage).then(function () {
                            return ApiClient.ajax({
                                type: 'POST',
                                url: ApiClient.getUrl('HDHomeRunGuide/Refresh')
                            });
                        }).then(function (result) {
                            setStatus(configPage, 'Refresh complete.\nSource: ' + valueOf(result, 'guideSource', 'GuideSource') + '\nTuners: ' + valueOf(result, 'tunerCount', 'TunerCount') + '\nXMLTV: ' + valueOf(result, 'guidePath', 'GuidePath') + '\nM3U: ' + valueOf(result, 'm3uPath', 'M3uPath') + '\nChannels: ' + valueOf(result, 'channelCount', 'ChannelCount') + '\nProgrammes: ' + valueOf(result, 'programmeCount', 'ProgrammeCount'));
                        }).catch(function (err) {
                            setStatus(configPage, problemMessage(err, 'Refresh failed.'));
                        }).finally(Dashboard.hideLoadingMsg);
                    }

                }

                window.hdhomerunGuideConfig = {
                    addMyTuners: function (button) {
                        clickButton({ target: button });
                        return false;
                    },
                    refreshNow: function (button) {
                        clickButton({ target: button });
                        return false;
                    }
                };

                if (!window.hdhomerunGuideConfigDelegatesBound) {
                    window.hdhomerunGuideConfigDelegatesBound = true;
                    document.addEventListener('submit', submitForm);
                    document.addEventListener('viewshow', function (event) {
                        if (event.target && event.target.id === rootId) {
                            loadConfig(event.target);
                        }
                    });
                }

                loadConfig(findPage(document.currentScript));
            })();
        </script>
    </div>
</body>
</html>
