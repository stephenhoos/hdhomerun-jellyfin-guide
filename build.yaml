overview: "Server-side HDHomeRun XMLTV guide refresh for Jellyfin"
description: >
  Downloads SiliconDust HDHomeRun XMLTV data with either fresh tuner DeviceAuth
  or optional account email plus the configured tuner's DeviceID, then writes
  Jellyfin-compatible XMLTV and M3U files from a scheduled server task. The
  plugin uses the official XMLTV endpoint instead of the render-oriented guide
  API at SiliconDust/HDHomeRun's request.
category: "Live TV"
owner: "Stephen Hoos"
artifacts:
- "Jellyfin.Plugin.HDHomeRunGuide.dll"
changelog: >
  Adds optional SiliconDust account email XMLTV access using the configured
  tuner's DeviceID while preserving the zero-config fresh DeviceAuth path.
  Updates release documentation to match SiliconDust's official XMLTV guide data
  page: 2 days for everyone and 14 days with HDHomeRun DVR guide service, while
  noting that SiliconDust controls the actual returned guide span. Sets the paid
  XMLTV refresh default to 68 hours until the 14-day window returns consistently.
